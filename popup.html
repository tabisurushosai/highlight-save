<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>えらんで保存</title>
    <style>
      :root {
        color-scheme: light;
        --color-bg: #eef3f8;
        --color-surface: #ffffff;
        --color-surface-soft: #f7fafc;
        --color-text: #111827;
        --color-muted: #334155;
        --color-border: #c7d2df;
        --color-border-soft: #dbe4ee;
        --color-primary: #185abc;
        --color-primary-hover: #0b3d91;
        --color-primary-soft: #e8f1ff;
        --color-focus: #0b57d0;
        --color-success-bg: #e8f5ed;
        --color-success-text: #0f5f39;
        --color-error-bg: #fdecec;
        --color-error-text: #8f1717;
        --color-warning-bg: #fff7ed;
        --color-warning-text: #713900;
        --shadow-card: 0 12px 28px rgb(15 23 42 / 11%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 390px;
        margin: 0;
        padding: 18px;
        background: var(--color-bg);
        color: var(--color-text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.55;
      }

      #appName {
        margin: 0 0 12px;
        color: var(--color-text);
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.005em;
      }

      #app {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 18px;
        border: 1px solid var(--color-border);
        border-radius: 18px;
        background: var(--color-surface);
        box-shadow: var(--shadow-card);
      }

      .premiumArea {
        margin-bottom: 0;
      }

      .premiumBadge,
      .trialCard {
        border-radius: 12px;
        padding: 12px;
        font-size: 13px;
        line-height: 1.45;
      }

      .premiumBadge {
        border: 1px solid #b7dfc6;
        background: var(--color-success-bg);
        color: var(--color-success-text);
        font-weight: 700;
      }

      .trialCard {
        display: grid;
        gap: 10px;
        border: 1px solid #f1d2aa;
        background: var(--color-warning-bg);
        color: var(--color-warning-text);
      }

      .trialText {
        margin-bottom: 0;
        font-weight: 600;
      }

      .savePanel {
        display: flex;
        flex-direction: column;
        gap: 9px;
        padding: 14px;
        border: 1px solid var(--color-border-soft);
        border-radius: 14px;
        background: var(--color-surface-soft);
      }

      .onboardingGuide {
        margin: 0 0 3px;
        padding: 11px 12px;
        border: 1px solid #c9dcff;
        border-radius: 12px;
        background: var(--color-primary-soft);
        color: #174ea6;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.45;
      }

      .fieldLabel {
        display: block;
        margin-bottom: 0;
        color: var(--color-muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .textInput {
        width: 100%;
        min-height: 48px;
        padding: 12px;
        border: 1px solid var(--color-border);
        border-radius: 12px;
        background: #ffffff;
        color: var(--color-text);
        font: inherit;
      }

      .textInput::placeholder {
        color: var(--color-muted);
        opacity: 1;
      }

      .textInput:focus-visible,
      .primaryButton:focus-visible,
      .secondaryButton:focus-visible,
      .highlightOpenBtn:focus-visible,
      .deleteBtn:focus-visible {
        outline: 3px solid var(--color-focus);
        outline-offset: 2px;
        box-shadow: 0 0 0 5px rgb(11 87 208 / 18%);
      }

      .textInput:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgb(24 90 188 / 14%);
      }

      .primaryButton,
      .secondaryButton {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      .primaryButton {
        background: var(--color-primary);
        color: #ffffff;
      }

      .primaryButton:hover {
        background: var(--color-primary-hover);
      }

      .primaryButton:disabled {
        background: #4f6f9f;
        cursor: progress;
      }

      .secondaryButton {
        border: 1px solid #d98f3c;
        background: #ffffff;
        color: var(--color-warning-text);
        min-height: 44px;
      }

      .secondaryButton:hover {
        background: #fff3e4;
      }

      .statusMessage {
        min-height: 0;
        margin: 0;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.45;
      }

      .statusMessage:not(:empty) {
        padding: 10px 12px;
        border: 1px solid transparent;
      }

      .statusMessage:empty {
        display: none;
      }

      .statusMessage--success {
        border-color: #b7dfc6;
        background: var(--color-success-bg);
        color: var(--color-success-text);
      }

      .statusMessage--error {
        border-color: #f3b8b8;
        background: var(--color-error-bg);
        color: var(--color-error-text);
      }

      .statusMessage--info {
        border-color: #c9dcff;
        background: var(--color-primary-soft);
        color: #174ea6;
      }

      .sectionHeader {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        border-top: 1px solid var(--color-border-soft);
        padding-top: 14px;
      }

      .sectionTitle {
        margin: 0;
        color: var(--color-text);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.3;
      }

      .sectionMeta {
        flex: 0 0 auto;
        color: var(--color-muted);
        font-size: 12px;
        font-weight: 700;
      }

      .highlightList {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 0;
      }

      .emptyState,
      .loadingState {
        padding: 18px 15px;
        border: 1px dashed var(--color-border);
        border-radius: 12px;
        background: var(--color-surface-soft);
        color: var(--color-muted);
        font-size: 13px;
        font-weight: 600;
        line-height: 1.55;
        text-align: center;
      }

      .emptyState {
        border-style: solid;
        text-align: left;
      }

      .emptyStateTitle {
        margin-bottom: 6px;
        color: var(--color-text);
        font-size: 14px;
        font-weight: 700;
      }

      .emptyStateDescription {
        margin: 0 0 12px;
      }

      .emptyStateSteps {
        margin: 0;
        padding: 0;
        list-style-position: inside;
      }

      .emptyStateSteps li + li {
        margin-top: 6px;
      }

      .emptyStateNextAction {
        margin: 14px 0 0;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #c9dcff;
        background: var(--color-primary-soft);
        color: #174ea6;
        font-weight: 700;
      }

      .loadingState {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 74px;
        border-style: solid;
        background: var(--color-primary-soft);
        color: #174ea6;
      }

      .highlightItem {
        position: relative;
      }

      .highlightOpenBtn {
        display: block;
        width: 100%;
        min-height: 56px;
        padding: 15px 64px 15px 15px;
        border: 1px solid var(--color-border);
        border-radius: 12px;
        background: var(--color-surface);
        color: inherit;
        cursor: pointer;
        font: inherit;
        text-align: left;
      }

      .highlightOpenBtn:hover {
        border-color: #9fb5cc;
        background: var(--color-surface-soft);
      }

      .highlightSnippet {
        display: block;
        margin-bottom: 6px;
        color: var(--color-text);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.45;
        word-break: break-word;
      }

      .highlightSavedAt {
        display: block;
        margin-bottom: 4px;
        color: var(--color-muted);
        font-size: 12px;
        font-weight: 600;
      }

      .highlightUrl {
        display: block;
        overflow: hidden;
        color: var(--color-muted);
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tagPill {
        display: inline-block;
        margin-right: 6px;
        padding: 2px 6px;
        border-radius: 999px;
        background: #e7f0ff;
        color: #174ea6;
        font-size: 11px;
        font-weight: 700;
      }

      .deleteBtn {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 1;
        width: 48px;
        height: 48px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--color-muted);
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
      }

      .deleteBtn:hover {
        background: var(--color-error-bg);
        color: var(--color-error-text);
      }
    </style>
  </head>
  <body>
    <h1 id="appName"></h1>
    <div id="app">...</div>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
