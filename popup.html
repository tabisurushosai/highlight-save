<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      :root {
        color-scheme: light;
        --color-bg: #f3f6fa;
        --color-surface: #ffffff;
        --color-surface-soft: #f8fafc;
        --color-text: #17202a;
        --color-muted: #526170;
        --color-border: #d6dee8;
        --color-primary: #1f6feb;
        --color-primary-hover: #185abc;
        --color-primary-soft: #e8f1ff;
        --color-success-bg: #e8f5ed;
        --color-success-text: #0f5f39;
        --color-error-bg: #fdecec;
        --color-error-text: #8f1717;
        --color-warning-bg: #fff7ed;
        --color-warning-text: #713900;
        --shadow-card: 0 10px 24px rgb(16 24 40 / 10%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 360px;
        margin: 0;
        padding: 18px;
        background: var(--color-bg);
        color: var(--color-text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }

      #appName {
        margin: 0 0 14px;
        color: var(--color-text);
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      #app {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--color-border);
        border-radius: 14px;
        background: var(--color-surface);
        box-shadow: var(--shadow-card);
      }

      .premiumArea {
        margin-bottom: 0;
      }

      .premiumBadge,
      .trialCard {
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.45;
      }

      .premiumBadge {
        border: 1px solid #b7dfc6;
        background: var(--color-success-bg);
        color: var(--color-success-text);
        font-weight: 700;
      }

      .trialCard {
        border: 1px solid #f1d2aa;
        background: var(--color-warning-bg);
        color: var(--color-warning-text);
      }

      .trialText {
        margin-bottom: 8px;
        font-weight: 600;
      }

      .savePanel {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .fieldLabel {
        display: block;
        margin-bottom: 0;
        color: var(--color-muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .textInput {
        width: 100%;
        min-height: 40px;
        padding: 9px 11px;
        border: 1px solid var(--color-border);
        border-radius: 10px;
        background: #ffffff;
        color: var(--color-text);
        font: inherit;
      }

      .textInput::placeholder {
        color: #7b8794;
      }

      .textInput:focus,
      .primaryButton:focus,
      .secondaryButton:focus,
      .deleteBtn:focus {
        outline: 2px solid rgb(31 111 235 / 35%);
        outline-offset: 2px;
      }

      .textInput:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgb(31 111 235 / 10%);
      }

      .primaryButton,
      .secondaryButton {
        width: 100%;
        min-height: 40px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      .primaryButton {
        background: var(--color-primary);
        color: #ffffff;
      }

      .primaryButton:hover {
        background: var(--color-primary-hover);
      }

      .secondaryButton {
        border: 1px solid #d98f3c;
        background: #ffffff;
        color: var(--color-warning-text);
      }

      .statusMessage {
        min-height: 0;
        margin: 0;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.45;
      }

      .statusMessage:not(:empty) {
        padding: 9px 11px;
      }

      .statusMessage:empty {
        display: none;
      }

      .statusMessage--success {
        background: var(--color-success-bg);
        color: var(--color-success-text);
      }

      .statusMessage--error {
        background: var(--color-error-bg);
        color: var(--color-error-text);
      }

      .highlightList {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 2px;
      }

      .emptyState,
      .loadingState {
        padding: 20px 14px;
        border: 1px dashed var(--color-border);
        border-radius: 12px;
        background: var(--color-surface-soft);
        color: var(--color-muted);
        font-size: 13px;
        font-weight: 600;
        line-height: 1.55;
        text-align: center;
      }

      .loadingState {
        border-style: solid;
        background: var(--color-primary-soft);
        color: #174ea6;
      }

      .highlightItem {
        position: relative;
        padding: 12px 42px 12px 12px;
        border: 1px solid var(--color-border);
        border-radius: 12px;
        background: var(--color-surface);
        cursor: pointer;
      }

      .highlightItem:hover {
        border-color: #b7c9dd;
        background: var(--color-surface-soft);
      }

      .highlightSnippet {
        margin-bottom: 6px;
        color: var(--color-text);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.45;
        word-break: break-word;
      }

      .highlightUrl {
        overflow: hidden;
        color: var(--color-muted);
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tagPill {
        display: inline-block;
        margin-right: 6px;
        padding: 2px 6px;
        border-radius: 999px;
        background: #e7f0ff;
        color: #174ea6;
        font-size: 11px;
        font-weight: 700;
      }

      .deleteBtn {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--color-muted);
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
      }

      .deleteBtn:hover {
        background: var(--color-error-bg);
        color: var(--color-error-text);
      }
    </style>
  </head>
  <body>
    <h3 id="appName"></h3>
    <div id="app">...</div>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
